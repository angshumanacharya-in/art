<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Tabspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            orange: '#ff6d00',
                            green: '#22c55e'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body, button, a {
            font-family: 'Calisto MT', 'Bookman Old Style', Georgia, serif !important;
        }
        .glow-btn:hover {
            box-shadow: 0 0 16px -2px rgba(255, 109, 0, 0.4);
            border-color: #ff6d00;
            color: #22c55e;
            background-color: #0c0a09;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased min-h-screen flex flex-col justify-between selection:bg-brand-orange selection:text-black">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-black border-b border-zinc-900 px-6 py-4">
        <div class="w-full flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 select-none">
                <a href="index.html" class="flex items-center shrink-0 py-1">
                    <img src="logo.png" alt="Tabspace Logo" class="h-16 md:h-20 w-auto object-contain block" />
                </a>
                <span class="text-zinc-500 text-lg md:text-2xl font-bold">/ 404 Error</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-2xl mx-auto px-6 py-20 text-center space-y-6">
        <h1 class="text-7xl md:text-9xl font-extrabold text-[#ff6d00] tracking-widest">
            404
        </h1>
        <h2 class="text-2xl md:text-4xl font-extrabold text-white">
            Page Not Found
        </h2>
        <p class="text-zinc-400 text-base md:text-lg font-bold leading-relaxed">
            The technical article or directory you are looking for doesn't exist or has been moved to another section.
        </p>
        
        <div class="pt-6">
            <a href="index.html" class="glow-btn inline-block bg-zinc-900 border border-zinc-800 text-white font-bold py-3 px-8 rounded-xl transition-all duration-200">
                &larr; Back to Technical Library
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 border-t border-zinc-900 text-center font-bold">
        <p class="text-xs tracking-wider text-zinc-500 font-bold">
            Presented by <span class="font-bold text-[#ff6d00]">Tabspace</span> <span class="text-brand-green font-bold">Presentations</span> &copy; 2026. All rights reserved.
        </p>
    </footer>

</body>
</html>
